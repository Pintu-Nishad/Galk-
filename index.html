<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Link Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-10 font-sans">

    <div class="max-w-md w-full bg-gray-800 p-8 rounded-3xl shadow-2xl border border-gray-700">
        <h1 class="text-2xl font-bold text-blue-400 mb-2">Image Link Loader</h1>
        <p class="text-gray-400 mb-6 text-sm">फोटो का Direct URL नीचे पेस्ट करें:</p>

        <input type="text" id="linkInput" 
            class="w-full p-4 rounded-xl bg-gray-900 border border-gray-600 text-blue-300 focus:ring-2 focus:ring-blue-500 outline-none mb-4"
            placeholder="https://example.com/photo.jpg">

        <button onclick="loadImageFromLink()" 
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition duration-300 shadow-lg mb-8">
            फोटो लोड करें
        </button>

        <div id="resultArea" class="hidden border-t border-gray-700 pt-6">
            <div class="relative group">
                <img id="outputImage" src="" alt="Loaded" class="w-full rounded-lg shadow-md mb-6 border border-gray-600">
            </div>
            
            <button onclick="downloadImage()" 
               class="block w-full text-center bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition shadow-lg">
               HD में Save करें
            </button>
        </div>
    </div>

    <script>
        async function loadImageFromLink() {
            const url = document.getElementById('linkInput').value.trim();
            const resultArea = document.getElementById('resultArea');
            const outputImage = document.getElementById('outputImage');

            if (url === "") {
                alert("भाई, पहले लिंक तो डालो!");
                return;
            }

            // फोटो दिखाना
            outputImage.src = url;
            resultArea.classList.remove('hidden');
            resultArea.scrollIntoView({ behavior: 'smooth' });
        }

        // ओरिजिनल क्वालिटी डाउनलोड करने के लिए खास फंक्शन
        async function downloadImage() {
            const imageUrl = document.getElementById('outputImage').src;
            
            try {
                // फोटो को बाइनरी (Blob) में फेच करना ताकि ओरिजिनल क्वालिटी मिले
                const response = await fetch(imageUrl);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = "Pintu_Original_HD.jpg";
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                // अगर CORS की वजह से फेच न हो, तो सीधा डाउनलोड ट्राई करें
                const a = document.createElement('a');
                a.href = imageUrl;
                a.download = "Pintu_Photo.jpg";
                a.target = "_blank";
                a.click();
            }
        }
    </script>
</body>
</html>
