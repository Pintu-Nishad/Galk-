<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pintu Private 4K AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #010409; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; overflow: hidden; }
        .glass-panel { background: rgba(13, 17, 23, 0.95); border: 1px solid #30363d; backdrop-filter: blur(10px); }
        .bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #238636, #2ea043); transition: width 0.3s; box-shadow: 0 0 15px #238636; }
        .shimmer { animation: shimmer 2s infinite linear; background: linear-gradient(to right, #30363d 4%, #484f58 25%, #30363d 36%); background-size: 1000px 100%; }
        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4" oncontextmenu="return false;">

    <div class="max-w-md w-full glass-panel p-10 rounded-[2rem] shadow-2xl relative">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black tracking-tighter text-white">PINTU <span class="text-green-500">4K</span> AI</h1>
            <div class="h-1 w-12 bg-green-500 mx-auto mt-2 rounded-full"></div>
        </div>

        <div id="step-1" class="space-y-6">
            <div class="p-12 border-2 border-dashed border-slate-700 rounded-3xl hover:border-green-500 hover:bg-green-500/5 transition-all cursor-pointer text-center group" onclick="document.getElementById('imgInput').click()">
                <svg class="w-12 h-12 mx-auto mb-4 text-slate-500 group-hover:text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <p class="text-sm font-bold text-slate-400 group-hover:text-slate-200 uppercase tracking-widest">Select Image for 4K</p>
                <input type="file" id="imgInput" class="hidden" accept="image/*" onchange="startProcess(this)">
            </div>
        </div>

        <div id="step-2" class="hidden py-8 space-y-6 text-center">
            <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                <div id="progressBar" class="bar-fill"></div>
            </div>
            <div class="flex justify-between text-[10px] font-mono text-slate-500 uppercase">
                <span id="statusTxt">Booting AI...</span>
                <span id="timerTxt">00:00:00</span>
            </div>
            <div class="shimmer h-4 w-full rounded-md mt-4"></div>
        </div>

        <div id="step-3" class="hidden space-y-6">
            <img id="finalPhoto" src="" class="w-full rounded-xl border border-slate-700 shadow-2xl">
            <a id="downloadLink" download="Pintu_4K_Enhanced.png" href="#" class="block w-full bg-green-600 hover:bg-green-500 text-white text-center py-4 rounded-xl font-bold transition shadow-lg active:scale-95">
                DOWNLOAD 4K PHOTO
            </a>
            <button onclick="location.reload()" class="w-full text-slate-600 text-[10px] uppercase hover:text-white transition">Upload Another</button>
        </div>
    </div>

    <script>
        // Security Lock
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) return false; };

        const MY_KEY = "3066d2047bcdcd26d069882359051aa10eaeb6e488316dc4430e24eefc6a52e51754827f6a5a8e84b0225c07eec468cc";

        async function startProcess(input) {
            if (!input.files[0]) return;

            // UI Transitions
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');

            const bar = document.getElementById('progressBar');
            const status = document.getElementById('statusTxt');
            const clock = document.getElementById('timerTxt');
            const steps = ["SCANNING...", "UPSCALING...", "REFINING...", "POLISHING..."];
            
            // Timer Logic
            let start = Date.now();
            let timerInterval = setInterval(() => {
                let diff = Date.now() - start;
                let ms = Math.floor((diff % 1000) / 10);
                let sec = Math.floor((diff / 1000) % 60);
                clock.innerText = `00:${sec < 10 ? '0'+sec : sec}:${ms < 10 ? '0'+ms : ms}`;
            }, 50);

            // Fake Progress Simulation
            for(let i=0; i<steps.length; i++){
                status.innerText = steps[i];
                bar.style.width = ((i+1)*25) + "%";
                await new Promise(r => setTimeout(r, 1500)); 
            }

            // Real API Execution
            const formData = new FormData();
            formData.append('image_file', input.files[0]);
            formData.append('target_width', '3840'); // 4K Target

            try {
                const response = await fetch('https://clipdrop-api.co/image-upscaling/v1/upscale', {
                    method: 'POST',
                    headers: { 'x-api-key': MY_KEY },
                    body: formData
                });

                if (response.status === 402) throw new Error("Credits Finished!");
                if (!response.ok) throw new Error("API Connection Failed");

                const blob = await response.blob();
                const photoUrl = URL.createObjectURL(blob);

                clearInterval(timerInterval);
                document.getElementById('step-2').classList.add('hidden');
                document.getElementById('step-3').classList.remove('hidden');
                document.getElementById('finalPhoto').src = photoUrl;
                document.getElementById('downloadLink').href = photoUrl;

            } catch (err) {
                clearInterval(timerInterval);
                alert("Error: " + err.message + "\nशायद इंटरनेट या API की (Key) में दिक्कत है।");
                location.reload();
            }
        }
    </script>
</body>
</html>
