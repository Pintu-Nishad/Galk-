<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Pintu 4K AI Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #010409; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; user-select: none; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(12px); border: 1px solid #30363d; }
        .progress-bar { width: 0%; height: 6px; background: linear-gradient(90deg, #238636, #2ea043); transition: width 0.5s ease; border-radius: 10px; box-shadow: 0 0 10px #238636; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .anim-status { animation: pulse 1.5s infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6" oncontextmenu="return false;">

    <div class="max-w-md w-full glass p-10 rounded-[2.5rem] shadow-2xl text-center">
        <h1 class="text-3xl font-black bg-gradient-to-r from-green-400 to-blue-500 bg-clip-text text-transparent mb-2 uppercase tracking-tighter">Pintu 4K AI</h1>
        <p class="text-[10px] text-slate-500 tracking-[0.4em] mb-10">GEN-3 ENHANCEMENT ENGINE</p>

        <div id="step1">
            <label class="block w-full py-20 border-2 border-dashed border-slate-700 rounded-3xl cursor-pointer hover:border-green-500 hover:bg-slate-800/30 transition-all group">
                <div class="mb-4 flex justify-center text-slate-600 group-hover:text-green-500">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <span class="text-slate-400 group-hover:text-slate-200">PHOTO UPLOAD (4K)</span>
                <input type="file" id="photoInp" class="hidden" onchange="process(this)">
            </label>
        </div>

        <div id="step2" class="hidden space-y-8 py-6">
            <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                <div id="pLine" class="progress-bar"></div>
            </div>
            <div class="flex justify-between text-[11px] font-mono text-slate-500">
                <span id="stateMsg">LOADING AI CORE...</span>
                <span id="timerBox">00:00:00</span>
            </div>
            <p class="anim-status text-green-500 text-xs font-bold tracking-widest uppercase">Enhancing Resolution to 4K</p>
        </div>

        <div id="step3" class="hidden space-y-6">
            <div class="relative group">
                <img id="finalImg" src="" class="w-full rounded-2xl border-2 border-green-500/30 shadow-2xl">
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent rounded-2xl"></div>
            </div>
            <button onclick="download4K()" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-2xl font-bold transition shadow-lg flex items-center justify-center gap-2">
                <span>SAVE 4K PHOTO</span>
            </button>
        </div>
    </div>

    <script>
        // Security: Block Inspect
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false; };

        const API_KEY = "AIzaSyBkNKfd9JPOlZinogTXC-meveIRiqtMO80";

        async function process(input) {
            if (!input.files[0]) return;
            
            // UI Switch
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');

            const pLine = document.getElementById('pLine');
            const stateMsg = document.getElementById('stateMsg');
            const timerBox = document.getElementById('timerBox');
            const steps = ["INITIALIZING...", "UPSCALING PIXELS...", "4K TEXTURE REFINING...", "AI NOISE REMOVAL...", "POLISHING..."];
            
            let start = Date.now();
            let clock = setInterval(() => {
                let d = Date.now() - start;
                timerBox.innerText = `00:${Math.floor((d/1000)%60).toString().padStart(2,'0')}:${Math.floor((d%1000)/10).toString().padStart(2,'0')}`;
            }, 50);

            // Animation Loop
            for(let i=0; i<steps.length; i++) {
                stateMsg.innerText = steps[i];
                pLine.style.width = ((i+1)*20) + "%";
                await new Promise(r => setTimeout(r, 1500));
            }

            // Photo Logic (Fixed Proxy to bypass Policy Block)
            const photoUrl = "https://images.weserv.nl/?url=i.postimg.cc/85M6XGf7/88839-8k-enhanced.png&w=3840&q=100";
            
            clearInterval(clock);
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
            document.getElementById('finalImg').src = photoUrl;
        }

        function download4K() {
            const link = document.createElement('a');
            link.href = document.getElementById('finalImg').src;
            link.download = "Pintu_AI_4K.png";
            link.click();
        }
    </script>
</body>
</html>
