<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2K Project - Pintu Nishad</title>
    <style>
        body { background: #0b0d0f; color: #e6edf3; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        header { background: #161b22; padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #30363d; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #21262d; padding: 12px; border-radius: 15px; max-width: 80%; border: 1px solid #30363d; animation: ghost 60s forwards; }
        @keyframes ghost { 0% { opacity: 1; } 100% { opacity: 0; display: none; } }
        footer { padding: 15px; display: flex; background: #0d1117; gap: 10px; border-top: 1px solid #30363d; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #30363d; background: #010409; color: white; outline: none; }
        button { background: #238636; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <header><strong>P2K SECURE v1.0</strong> <button onclick="window.makeCall()">📞 CALL</button></header>
    <div id="chat-box"></div>
    <footer><input type="text" id="m" placeholder="Ghost Mode On..."><button onclick="window.send()">➤</button></footer>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const conf = { apiKey: "AIzaSyD3HUZgZ1G2hN4BXnIbRV8eD0nPlWUaByM", projectId: "galk-55f49", databaseURL: "https://galk-55f49-default-rtdb.firebaseio.com" };
        const app = initializeApp(conf); const db = getDatabase(app);
        window.send = () => { const i = document.getElementById('m'); if(i.value) { push(ref(db, 'messages'), { t: i.value }); i.value = ''; } };
        onChildAdded(ref(db, 'messages'), (s) => { const d = document.createElement('div'); d.className='msg'; d.innerText=s.val().t; document.getElementById('chat-box').appendChild(d); });
        window.makeCall = () => set(ref(db, 'calls/active'), true);
    </script>
</body>
</html>
