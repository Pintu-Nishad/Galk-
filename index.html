<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2K - Secure Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="main-header">
        <div class="user-info">
            <span id="room-name">ग्रुप रूम</span>
            <span id="online-count">5 ऑनलाइन</span>
        </div>
        <div class="header-actions">
            <button id="group-call-btn">📞</button>
            <button id="settings-btn">⚙️</button>
        </div>
    </header>

    <div id="call-notification" class="call-popup hidden">
        <div class="call-info">
            <span>Incoming Group Call...</span>
        </div>
        <div class="call-btns">
            <button id="accept-call" class="btn-accept">Accept</button>
            <button id="reject-call" class="btn-reject">Reject</button>
        </div>
    </div>

    <main id="chat-window">
        <div id="messages-container">
            </div>
    </main>
    <footer id="chat-footer">
        <button id="attach-btn">+</button>
        <div id="media-menu" class="hidden">
            <button title="Photo">📷</button>
            <button title="Video">🎥</button>
        </div>
        <input type="text" id="msg-input" placeholder="संदेश लिखें...">
        <button id="send-btn">Send</button>
        <button id="mic-btn">🎤</button>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
