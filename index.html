<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pintu 4K AI Ultra HD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #e2e8f0; font-family: 'Inter', sans-serif; user-select: none; overflow-x: hidden; }
        .glass-ui { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(59, 130, 246, 0.2); }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #3b82f6, #10b981); transition: width 0.4s ease; border-radius: 20px; box-shadow: 0 0 15px #3b82f6; }
        .anim-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4" oncontextmenu="return false;">

    <div class="max-w-md w-full glass-ui p-10 rounded-[3rem] shadow-[0_0_50px_rgba(0,0,0,0.5)] text-center">
        <div class="mb-10">
            <h1 class="text-3xl font-black bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent tracking-tighter uppercase">PINTU 4K ENGINE</h1>
            <p class="text-[10px] text-slate-500 tracking-[0.4em] mt-2">ULTRA HD RECONSTRUCTION</p>
        </div>

        <div id="uploadBox">
            <label class="block w-full py-20 border-2 border-dashed border-slate-800 rounded-[2.5rem] cursor-pointer hover:border-blue-500 hover:bg-blue-500/5 transition-all group">
                <div class="mb-4 flex justify-center text-slate-600 group-hover:text-blue-500">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <span class="text-slate-400 font-bold group-hover:text-slate-200">PHOTO SELECT (4K)</span>
                <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleProcess(this)">
            </label>
        </div>

        <div id="loadingBox" class="hidden py-8 space-y-6">
            <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                <div id="bar" class="progress-fill"></div>
            </div>
            <div class="flex justify-between text-[11px] font-mono text-slate-500">
                <span id="statusLabel">SCANNING PIXELS...</span>
                <span id="timerLabel">00:00:00</span>
            </div>
            <p class="anim-pulse text-blue-400 text-xs font-bold tracking-widest uppercase">Upscaling to 4K Ultra HD</p>
        </div>

        <div id="resultBox" class="hidden space-y-6 animate-in fade-in duration-700">
            <img id="finalImg" src="" class="w-full rounded-2xl border-2 border-blue-500/30 shadow-2xl">
            <a id="dlBtn" download="Pintu_AI_4K.png" href="#" class="block w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-bold tracking-widest shadow-lg transition-all active:scale-95">
                DOWNLOAD 4K PHOTO
            </a>
            <button onclick="location.reload()" class="text-slate-500 text-xs hover:text-white transition underline">दूसरी फोटो लोड करें</button>
        </div>
    </div>

    <script>
        // Security: Block Inspect & Right Click
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) return false; };

        const CLIPDROP_KEY = "3066d2047bcdcd26d069882359051aa10eaeb6e488316dc4430e24eefc6a52e51754827f6a5a8e84b0225c07eec468cc";

        async function handleProcess(input) {
            if (!input.files[0]) return;

            // UI Switch
            document.getElementById('uploadBox').classList.add('hidden');
            document.getElementById('loadingBox').classList.remove('hidden');

            const bar = document.getElementById('bar');
            const statusLabel = document.getElementById('statusLabel');
            const timerLabel = document.getElementById('timerLabel');
            const steps = ["INITIALIZING...", "AI RECONSTRUCTION...", "4K TEXTURE REFINING...", "AI NOISE REDUCTION...", "POLISHING..."];
            
            // Timer Start
            let start = Date.now();
            let clock = setInterval(() => {
                let d = Date.now() - start;
                timerLabel.innerText = `00:${Math.floor((d/1000)%60).toString().padStart(2,'0')}:${Math.floor((d%1000)/10).toString().padStart(2,'0')}`;
            }, 50);

            // Fake Progress for UX
            for(let i=0; i<steps.length; i++) {
                statusLabel.innerText = steps[i];
                bar.style.width = ((i+1)*20) + "%";
                await new Promise(r => setTimeout(r, 1200));
            }

            // Real API Call to ClipDrop
            const formData = new FormData();
            formData.append('image_file', input.files[0]);
            formData.append('target_width', '3840'); // 4K Width
            formData.append('target_height', '2160'); // 4K Height

            try {
                const response = await fetch('https://clipdrop-api.co/image-upscaling/v1/upscale', {
                    method: 'POST',
                    headers: { 'x-api-key': CLIPDROP_KEY },
                    body: formData
                });

                if (!response.ok) throw new Error('API Error');

                const blob = await response.blob();
                const outputUrl = URL.createObjectURL(blob);

                clearInterval(clock);
                document.getElementById('loadingBox').classList.add('hidden');
                document.getElementById('resultBox').classList.remove('hidden');
                document.getElementById('finalImg').src = outputUrl;
                document.getElementById('dlBtn').href = outputUrl;

            } catch (err) {
                alert("API Error! कृपया अपनी Key या इंटरनेट चेक करें।");
                location.reload();
            }
        }
    </script>
</body>
</html>
