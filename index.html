<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Chat + Call</title>
<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white}
#app{display:flex;flex-direction:column;height:100vh}
header{background:#1e293b;padding:10px;display:flex;justify-content:space-between;align-items:center}
#messages{flex:1;overflow:auto;padding:10px}
.msg{background:#334155;margin:5px;padding:8px;border-radius:8px}
.join{color:lightgreen}
.left{color:red}
#inputBox{display:flex;padding:10px;background:#1e293b}
input{flex:1;padding:10px;border:none;border-radius:5px}
button{margin-left:5px;padding:10px;border:none;border-radius:5px;background:#22c55e;color:white}
#callBox{position:fixed;bottom:10px;right:10px;width:200px;height:150px;background:black;border-radius:10px;display:none}
</style>
</head>
<body>
<div id="app">
<header>
<span id="roomTitle">Room</span>
<button onclick="startCall()">📞</button>
</header><div id="messages"></div><div id="inputBox">
<input id="msg" placeholder="Type message">
<button onclick="sendMsg()">Send</button>
</div>
</div><div id="callBox"></div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "galk-55f49.firebaseapp.com",
  projectId: "galk-55f49"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let room = prompt("Room ID");
let user = prompt("Your Name");

const msgRef = collection(db, "rooms", room, "messages");

// Join message
addDoc(msgRef,{type:"join",user,time:Date.now()});

// Listen messages
onSnapshot(msgRef,(snap)=>{
let html="";
snap.forEach(doc=>{
let d = doc.data();
if(d.type=="join") html+=`<div class='join'>${d.user} joined</div>`;
else if(d.type=="left") html+=`<div class='left'>${d.user} left</div>`;
else html+=`<div class='msg'><b>${d.user}:</b> ${d.text}</div>`;

// Auto delete after 1 min
if(Date.now()-d.time > 60000){ deleteDoc(doc.ref); }
});

document.getElementById('messages').innerHTML=html;
});

window.sendMsg = function(){
let text = document.getElementById('msg').value;
addDoc(msgRef,{type:"msg",user,text,time:Date.now()});
document.getElementById('msg').value="";
}

// Leave event
window.onbeforeunload = ()=>{
addDoc(msgRef,{type:"left",user,time:Date.now()});
}

// CALL SYSTEM (basic WebRTC placeholder)
window.startCall = function(){
let box = document.getElementById('callBox');
box.style.display='block';
box.innerHTML="Call Started (upgrade me full system dunga)";
}

// Disable right click & inspect
window.addEventListener('contextmenu',e=>e.preventDefault());
document.onkeydown = function(e){
if(e.key=="F12") return false;
}

</script></body>
</html>
