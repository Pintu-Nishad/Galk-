<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2K Secure Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="user-info">
            <span id="room-name">ग्रुप रूम</span>
            <span id="online-count">● ऑनलाइन</span>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="group-call-btn" title="Group Call">📞</button>
            <button class="icon-btn" id="settings-btn">⚙️</button>
        </div>
    </header>

    <div id="call-notification" class="call-popup hidden">
        <div class="call-content">
            <span class="pulse-icon">📞</span>
            <span>Incoming Group Call...</span>
        </div>
        <div class="call-btns">
            <button id="accept-call" class="btn-accept">Accept</button>
            <button id="reject-call" class="btn-reject">Reject</button>
        </div>
    </div>

    <main id="chat-window">
        <div id="messages-container">
            </div>
    </main>

    <footer>
        <button class="icon-btn" id="attach-btn">+</button>
        <input type="text" id="msg-input" placeholder="संदेश लिखें..." autocomplete="off">
        <button id="send-btn">➤</button>
        <button class="icon-btn" id="mic-btn">🎤</button>
    </footer>

    <script type="module" src="script.js"></script>
</body>
</html>
