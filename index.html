<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pintu Photo Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </script>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-md w-full glass p-8 rounded-3xl shadow-2xl">
        <h1 class="text-3xl font-extrabold text-blue-400 mb-2 text-center">Photo Loader</h1>
        <p class="text-gray-400 mb-8 text-center text-sm">फोटो का लिंक नीचे पेस्ट करें</p>

        <input type="text" id="linkInput" 
            class="w-full p-4 rounded-2xl bg-gray-900 border border-gray-700 text-blue-300 focus:ring-2 focus:ring-blue-500 outline-none mb-6 shadow-inner"
            placeholder="https://example.com/photo.jpg">

        <button onclick="loadImage()" 
            class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-4 rounded-2xl transition duration-300 transform active:scale-95 shadow-lg mb-8">
            फोटो लोड करें
        </button>

        <div id="resultArea" class="hidden space-y-6">
            <div class="relative rounded-2xl overflow-hidden border border-gray-600 shadow-lg">
                <img id="outputImage" src="" alt="Loaded" class="w-full object-cover">
            </div>
            
            <button onclick="forceDownload()" 
               class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-4 rounded-2xl transition transform active:scale-95 shadow-lg flex items-center justify-center gap-2">
               <span>HD में Save करें</span>
            </button>
        </div>
    </div>

    <script>
        // फोटो लोड करने का फंक्शन
        function loadImage() {
            const url = document.getElementById('linkInput').value.trim();
            const outputImage = document.getElementById('outputImage');
            const resultArea = document.getElementById('resultArea');

            if (!url) {
                alert("भाई, लिंक तो डालो!");
                return;
            }

            // CORS और लोडिंग सेटअप
            outputImage.crossOrigin = "anonymous"; 
            outputImage.src = url;

            outputImage.onload = () => {
                resultArea.classList.remove('hidden');
                resultArea.scrollIntoView({ behavior: 'smooth' });
            };

            outputImage.onerror = () => {
                alert("यह लिंक काम नहीं कर रहा या प्राइवेट है। दूसरा ट्राई करें!");
            };
        }

        // डाउनलोड करने का सबसे पक्का तरीका (Blob Method)
        async function forceDownload() {
            const imageUrl = document.getElementById('outputImage').src;
            try {
                const response = await fetch(imageUrl);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = url;
                link.download = "Pintu_HD_Photo.jpg";
                document.body.appendChild(link);
                link.click();
                
                // सफाई करना
                document.body.removeChild(link);
                window.URL.revokeObjectURL(url);
            } catch (err) {
                // अगर Fetch फेल हो तो सीधा ओपन कर देना
                window.open(imageUrl, '_blank');
            }
        }
    </script>
</body>
</html>
