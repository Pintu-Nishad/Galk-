<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pintu 8K Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-5">

    <div class="max-w-md w-full bg-zinc-900 p-8 rounded-[2.5rem] border border-zinc-800 shadow-2xl">
        <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-500 to-cyan-400 bg-clip-text text-transparent mb-6 text-center">Photo Processor</h1>

        <input type="text" id="linkInput" 
            class="w-full p-4 rounded-2xl bg-zinc-800 border border-zinc-700 text-cyan-300 focus:ring-2 focus:ring-blue-500 outline-none mb-4"
            placeholder="इमेज लिंक यहाँ पेस्ट करें...">

        <button onclick="processImage()" 
            class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-lg mb-6">
            फोटो लोड करें
        </button>

        <div id="resultArea" class="hidden">
            <div id="loader" class="text-center py-4 text-blue-400 animate-pulse">प्रोसेसिंग हो रही है...</div>
            <img id="outputImage" src="" alt="Result" class="w-full rounded-2xl border border-zinc-700 mb-4 hidden">
            
            <a id="downloadBtn" href="#" download="Pintu_8K_Photo.jpg"
               class="hidden w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-2xl text-center transition-all shadow-lg">
               HD में डाउनलोड करें
            </a>
        </div>
    </div>

    <script>
        async function processImage() {
            const inputUrl = document.getElementById('linkInput').value.trim();
            const img = document.getElementById('outputImage');
            const resultArea = document.getElementById('resultArea');
            const downloadBtn = document.getElementById('downloadBtn');
            const loader = document.getElementById('loader');

            if (!inputUrl) return alert("लिंक पेस्ट करो भाई!");

            resultArea.classList.remove('hidden');
            loader.classList.remove('hidden');
            img.classList.add('hidden');
            downloadBtn.classList.add('hidden');

            try {
                // यह प्रॉक्सी किसी भी इमेज को 'Allow' कर देती है
                const proxyUrl = "https://images.weserv.nl/?url=" + encodeURIComponent(inputUrl);
                
                const response = await fetch(proxyUrl);
                const blob = await response.blob();
                const reader = new FileReader();

                reader.onloadend = () => {
                    const base64data = reader.result;
                    img.src = base64data;
                    downloadBtn.href = base64data;
                    
                    loader.classList.add('hidden');
                    img.classList.remove('hidden');
                    downloadBtn.classList.remove('hidden');
                };

                reader.readAsDataURL(blob);
            } catch (error) {
                alert("लिंक खराब है या लोड नहीं हो रहा।");
                console.error(error);
            }
        }
    </script>
</body>
</html>
