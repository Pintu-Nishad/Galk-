<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>आपके साथ चैट - HD रैंडम वीडियो कॉल</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>

    <header>
        <h1>आपके साथ चैट</h1>
        <div id="status">कैमरा अनुमति का इंतज़ार है...</div>
    </header>

    <div class="video-grid">
        <div class="video-wrapper">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="label">आप (You)</div>
        </div>
        <div class="video-wrapper">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="label">अजनबी (Stranger)</div>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn" class="btn next-btn">Next अजनबी</button>
        <button id="toggleVideo" class="btn control-btn">📷 Video ON</button>
        <button id="toggleAudio" class="btn control-btn">🎤 Mic ON</button>
        <button class="btn stop-btn" onclick="location.reload()">Stop / Reset</button>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
