<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Online Voice</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        .container { background: var(--card); padding: 2rem; border-radius: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 350px; }
        
        #status { font-size: 0.9rem; margin-bottom: 1rem; color: var(--accent); font-weight: 600; min-height: 20px; }
        
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
        .cell { aspect-ratio: 1; background: var(--bg); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 800; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .cell:hover:not(.taken) { border-color: var(--accent); background: #1e293b; }
        .cell.taken { cursor: default; }
        .cell[data-val="X"] { color: #f87171; }
        .cell[data-val="O"] { color: #fbbf24; }

        .btn-play { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn-play:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }

        /* Voice Panel */
        .voice-controls { margin-top: 20px; padding: 15px; background: #000; border-radius: 12px; display: none; flex-direction: column; gap: 8px; border: 1px solid #334155; }
        .mute-btn { background: #ef4444; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .mute-btn.on { background: #22c55e; }
        .mic-indicator { font-size: 0.75rem; color: #10b981; display: flex; align-items: center; justify-content: center; gap: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="margin-top:0">Tic-Tac-Toe</h2>
        <div id="status">Initializing...</div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
        </div>

        <button class="btn-play" id="match-btn" onclick="findPlayer()">Find Online Opponent</button>

        <div class="voice-controls" id="voice-panel">
            <div class="mic-indicator" id="mic-status">● Live Audio Connected</div>
            <button class="mute-btn" id="mute-btn" onclick="toggleMic()">Mute Microphone</button>
        </div>
    </div>

    <audio id="remoteAudio" autoplay></audio>

<script>
    // Firebase Config (Using your provided details)
    const firebaseConfig = {
        apiKey: "AIzaSyD3HUZgZ1G2hN4BXnIbRV8eD0nPlWUaByM",
        authDomain: "galk-55f49.firebaseapp.com",
        projectId: "galk-55f49",
        storageBucket: "galk-55f49.firebasestorage.app",
        messagingSenderId: "1005825050326",
        appId: "1:1005825050326:web:fda4271183b4c4ff106b77",
        databaseURL: "https://galk-55f49-default-rtdb.firebaseio.com/"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const lobbyRef = db.ref('match_lobby');

    let peer = new Peer();
    let myId, conn, localStream;
    let board = Array(9).fill("");
    let mySymbol = "X";
    let turn = "X";
    let isMuted = false;

    peer.on('open', id => { 
        myId = id; 
        document.getElementById('status').innerText = "Ready to play!";
    });

    // --- Matchmaking ---
    function findPlayer() {
        const btn = document.getElementById('match-btn');
        btn.disabled = true;
        btn.innerText = "Searching...";
        document.getElementById('status').innerText = "Looking for someone online...";

        lobbyRef.once('value', snapshot => {
            const data = snapshot.val();
            if (data && data.waitingUser && data.waitingUser !== myId) {
                // Someone is waiting, connect!
                const targetId = data.waitingUser;
                lobbyRef.remove(); 
                mySymbol = "O";
                connectToPeer(targetId);
            } else {
                // Nobody waiting, put me in lobby
                lobbyRef.set({ waitingUser: myId });
            }
        });
    }

    function connectToPeer(id) {
        const c = peer.connect(id);
        setupConnection(c);
        startVoice(id);
    }

    peer.on('connection', c => {
        mySymbol = "X";
        setupConnection(c);
    });

    function setupConnection(c) {
        conn = c;
        conn.on('open', () => {
            document.getElementById('status').innerText = "Match Found! You: " + mySymbol;
            document.getElementById('match-btn').style.display = "none";
            document.getElementById('voice-panel').style.display = "flex";
        });
        conn.on('data', data => {
            if(data.type === 'move') applyMove(data.index, data.symbol);
        });
    }

    // --- Voice Logic ---
    async function startVoice(targetId) {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const call = peer.call(targetId, localStream);
            call.on('stream', stream => document.getElementById('remoteAudio').srcObject = stream);
        } catch (e) { console.error("Mic Error:", e); }
    }

    peer.on('call', async call => {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            call.answer(localStream);
            call.on('stream', stream => document.getElementById('remoteAudio').srcObject = stream);
            document.getElementById('voice-panel').style.display = "flex";
        } catch (e) { console.error("Mic Error:", e); }
    });

    function toggleMic() {
        if (!localStream) return;
        isMuted = !isMuted;
        localStream.getAudioTracks()[0].enabled = !isMuted;
        const btn = document.getElementById('mute-btn');
        const status = document.getElementById('mic-status');
        
        btn.innerText = isMuted ? "Unmute Microphone" : "Mute Microphone";
        btn.style.background = isMuted ? "#22c55e" : "#ef4444";
        status.innerText = isMuted ? "○ Microphone Muted" : "● Live Audio Connected";
        status.style.color = isMuted ? "#94a3b8" : "#10b981";
    }

    // --- Game Engine ---
    document.querySelectorAll('.cell').forEach(cell => {
        cell.onclick = () => {
            const idx = cell.dataset.index;
            if(board[idx] === "" && turn === mySymbol && conn) {
                applyMove(idx, mySymbol);
                conn.send({ type: 'move', index: idx, symbol: mySymbol });
            }
        };
    });

    function applyMove(i, sym) {
        board[i] = sym;
        const cell = document.querySelectorAll('.cell')[i];
        cell.innerText = sym;
        cell.setAttribute('data-val', sym);
        cell.classList.add('taken');
        turn = (sym === "X") ? "O" : "X";
        document.getElementById('status').innerText = (turn === mySymbol) ? "Your Turn!" : "Waiting for opponent...";
        checkWin();
    }

    function checkWin() {
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        for (let p of wins) {
            if (board[p[0]] && board[p[0]] === board[p[1]] && board[p[0]] === board[p[2]]) {
                alert(board[p[0]] + " Wins!");
                location.reload();
                return;
            }
        }
        if (!board.includes("")) { alert("Draw!"); location.reload(); }
    }
</script>
</body>
</html>
