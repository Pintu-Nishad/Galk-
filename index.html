<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Private Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #e5ddd5; height: 100vh; display: flex; flex-direction: column; }
        
        /* लॉगिन स्क्रीन */
        #login-screen { display: flex; align-items: center; justify-content: center; height: 100%; padding: 20px; background: #075E54; }
        .card { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        h2 { text-align: center; color: #075E54; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; outline: none; }
        button { width: 100%; padding: 12px; background: #25D366; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }

        /* चैट स्क्रीन */
        #chat-screen { display: none; flex-direction: column; height: 100%; }
        header { background: #075E54; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 10px; font-size: 15px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .sent { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: white; border-bottom-left-radius: 2px; }
        .sender-name { font-size: 10px; font-weight: bold; color: #075E54; margin-bottom: 3px; }
        
        .input-area { padding: 10px; background: #f0f0f0; display: flex; gap: 8px; }
        #message-input { flex: 1; border-radius: 20px; padding: 12px 15px; border: none; }
        #send-btn { width: auto; padding: 0 20px; border-radius: 20px; background: #075E54; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="card">
            <h2>Chat Login</h2>
            <input type="text" id="username" placeholder="अपना नाम लिखें">
            <input type="text" id="room-code" placeholder="रूम कोड डालें">
            <button id="join-btn">चैट शुरू करें</button>
        </div>
    </div>

    <div id="chat-screen">
        <header id="room-display">Room: </header>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="संदेश लिखें...">
            <button id="send-btn">➤</button>
        </div>
    </div>

    <script type="module">
        // Firebase Import
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // आपकी Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD3HUZgZ1G2hN4BXnIbRV8eD0nPlWUaByM",
            authDomain: "galk-55f49.firebaseapp.com",
            projectId: "galk-55f49",
            storageBucket: "galk-55f49.firebasestorage.app",
            messagingSenderId: "1005825050326",
            appId: "1:1005825050326:web:fda4271183b4c4ff106b77"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myName = "";
        let roomCode = "";

        // लॉगिन और रूम जॉइन करना
        document.getElementById('join-btn').onclick = () => {
            myName = document.getElementById('username').value.trim();
            roomCode = document.getElementById('room-code').value.trim();

            if (myName && roomCode) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('room-display').innerText = "Room: " + roomCode;

                // रूम के मैसेज लोड करना
                const messagesRef = ref(db, 'rooms/' + roomCode);
                onChildAdded(messagesRef, (snapshot) => {
                    const data = snapshot.val();
                    displayMessage(data.sender, data.text, data.sender === myName);
                });
            } else {
                alert("नाम और कोड दोनों ज़रूरी हैं!");
            }
        };

        // मैसेज भेजना
        document.getElementById('send-btn').onclick = sendMessage;
        document.getElementById('message-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (text) {
                const messagesRef = ref(db, 'rooms/' + roomCode);
                push(messagesRef, {
                    sender: myName,
                    text: text,
                    timestamp: serverTimestamp()
                });
                input.value = "";
            }
        }

        // स्क्रीन पर मैसेज दिखाना
        function displayMessage(sender, text, isMe) {
            const msgArea = document.getElementById('messages');
            const div = document.createElement('div');
            div.classList.add('msg', isMe ? 'sent' : 'received');
            div.innerHTML = `<div class="sender-name">${isMe ? 'You' : sender}</div>${text}`;
            msgArea.appendChild(div);
            msgArea.scrollTop = msgArea.scrollHeight;
        }
    </script>
</body>
</html>
