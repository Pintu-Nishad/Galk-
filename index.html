<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pintu Photo Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-800/50 backdrop-blur-xl p-8 rounded-[2rem] shadow-2xl border border-white/10">
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2 text-center">Photo Loader</h1>
        <p class="text-slate-400 mb-8 text-center text-sm">लिंक पेस्ट करें और जादू देखें</p>

        <input type="text" id="linkInput" 
            class="w-full p-4 rounded-2xl bg-slate-900/80 border border-slate-700 text-blue-300 focus:ring-2 focus:ring-blue-500 outline-none mb-4"
            placeholder="https://...">

        <button onclick="loadImage()" 
            class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-lg mb-6">
            फोटो लोड करें
        </button>

        <div id="resultArea" class="hidden animate-fade-in">
            <img id="outputImage" src="" alt="Loaded" class="w-full rounded-2xl border border-slate-700 shadow-md mb-4">
            
            <button id="downloadBtn" onclick="forceDownload()" 
               class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-2xl transition-all active:scale-95">
               HD में डाउनलोड करें
            </button>
        </div>
    </div>

    <script>
        function loadImage() {
            const input = document.getElementById('linkInput').value.trim();
            const img = document.getElementById('outputImage');
            const result = document.getElementById('resultArea');

            if (!input) return alert("लिंक कहाँ है भाई?");

            // CORS Proxy का इस्तेमाल ताकि 'Not Found' या खाली न आए
            const proxyUrl = "https://images.weserv.nl/?url=" + encodeURIComponent(input.replace(/^https?:\/\//, ''));
            
            img.src = proxyUrl;

            img.onload = () => {
                result.classList.remove('hidden');
            };

            img.onerror = () => {
                alert("यह फोटो लोड नहीं हो रही। कृपया दूसरा लिंक ट्राई करें!");
            };
        }

        async function forceDownload() {
            const img = document.getElementById('outputImage');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            ctx.drawImage(img, 0, 0);
            
            const link = document.createElement('a');
            link.download = "Pintu_8K_Photo.jpg";
            link.href = canvas.toDataURL('image/jpeg', 1.0);
            link.click();
        }
    </script>
</body>
</html>
