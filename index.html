<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aapke Saath Chat | Split Screen</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>

    <div class="split-container">
        <div class="video-box top">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="label">Ajnabi (Stranger)</div>
        </div>

        <div class="mid-controls">
            <button id="muteBtn" class="icon-btn">🎤</button>
            <button id="videoBtn" class="icon-btn">📷</button>
            <button id="startBtn" class="next-btn">Next</button>
            <button id="switchBtn" class="icon-btn">🔄</button>
            <button id="endBtn" class="end-btn" onclick="location.reload()">End</button>
        </div>

        <div class="video-box bottom">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="label">Aap (You)</div>
            <div id="callStatus" class="status-text">Taiyaar ho rahe hain...</div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
