<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2K Secure Chat</title>
    <style>
        /* CSS हिस्सा */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #121212; color: white; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: #1f1f1f; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        #room-name { font-weight: bold; }
        #online-count { font-size: 0.8rem; color: #4caf50; display: block; }

        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #121212; }
        
        .msg { max-width: 80%; padding: 10px; border-radius: 10px; font-size: 0.9rem; word-wrap: break-word; }
        .msg-sent { align-self: flex-end; background: #075e54; }
        
        footer { background: #1f1f1f; padding: 10px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #333; }
        #msg-input { flex: 1; background: #333; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }
        #send-btn { background: #4caf50; border: none; padding: 10px 15px; border-radius: 50%; color: white; cursor: pointer; }
        .icon-btn { background: none; border: none; color: #bbb; font-size: 1.2rem; cursor: pointer; }

        .hidden { display: none; }
        .call-popup { position: fixed; top: 60px; left: 0; right: 0; background: #2c3e50; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #4caf50; z-index: 1000; }
    </style>
</head>
<body>

    <header>
        <div>
            <span id="room-name">ग्रुप रूम</span>
            <span id="online-count">● ऑनलाइन</span>
        </div>
        <div>
            <button class="icon-btn" id="group-call-btn">📞</button>
            <button class="icon-btn">⚙️</button>
        </div>
    </header>

    <div id="call-notification" class="call-popup hidden">
        <span>Incoming Group Call...</span>
        <div>
            <button style="background: #4caf50; color: white; border: none; padding: 5px 10px; border-radius: 4px;" id="accept-call">Accept</button>
            <button style="background: #f44336; color: white; border: none; padding: 5px 10px; border-radius: 4px;" id="reject-call">Reject</button>
        </div>
    </div>

    <main id="chat-window">
        </main>

    <footer>
        <button class="icon-btn">+</button>
        <input type="text" id="msg-input" placeholder="संदेश लिखें...">
        <button id="send-btn">➤</button>
        <button class="icon-btn">🎤</button>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3HUZgZ1G2hN4BXnIbRV8eD0nPlWUaByM",
            authDomain: "galk-55f49.firebaseapp.com",
            projectId: "galk-55f49",
            storageBucket: "galk-55f49.firebasestorage.app",
            messagingSenderId: "1005825050326",
            appId: "1:1005825050326:web:fda4271183b4c4ff106b77"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');
        const callRef = ref(db, 'calls/currentStatus');

        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const chatWindow = document.getElementById('chat-window');
        const callPopup = document.getElementById('call-notification');

        // मैसेज भेजना
        sendBtn.onclick = () => {
            if (msgInput.value.trim() !== "") {
                push(messagesRef, { text: msgInput.value, time: Date.now() });
                msgInput.value = "";
            }
        };

        // मैसेज दिखाना
        onChildAdded(messagesRef, (data) => {
            const m = data.val();
            const div = document.createElement('div');
            div.className = 'msg msg-sent';
            div.innerText = m.text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });

        // कॉल बटन लॉजिक
        document.getElementById('group-call-btn').onclick = () => {
            set(callRef, { type: 'group', status: 'ringing' });
        };

        onValue(callRef, (snapshot) => {
            if (snapshot.val()?.status === 'ringing') {
                callPopup.classList.remove('hidden');
            }
        });

        document.getElementById('reject-call').onclick = () => {
            callPopup.classList.add('hidden');
            set(callRef, null);
        };
    </script>
</body>
</html>
