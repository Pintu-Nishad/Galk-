<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple AI Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col min-h-screen">
  <header class="p-4 text-center text-xl font-bold bg-gray-800 shadow">
    My AI Assistant
  </header>  <main id="chat" class="flex-1 p-4 space-y-3 overflow-y-auto"></main>  <div class="p-4 bg-gray-800 flex gap-2">
    <input id="input" class="flex-1 p-2 rounded text-black" placeholder="Ask anything..." />
    <button onclick="sendMsg()" class="bg-blue-600 px-4 py-2 rounded">Send</button>
  </div>  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');

    const API_KEY = "AIzaSyBkNKfd9JPOlZinogTXC-meveIRiqtMO80"; // Replace with your own key

    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = sender === 'user' ? 'text-right' : 'text-left';
      div.innerHTML = `<span class="inline-block p-2 rounded ${sender === 'user' ? 'bg-blue-600' : 'bg-gray-700'}">${text}</span>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMsg() {
      const text = input.value.trim();
      if (!text) return;
      addMessage(text, 'user');
      input.value = '';

      try {
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: 'gpt-4o-mini',
            messages: [{ role: 'user', content: text }]
          })
        });

        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content || 'No response';
        addMessage(reply, 'bot');
      } catch (e) {
        addMessage('Error contacting AI', 'bot');
      }
    }
  </script></body>
</html>
